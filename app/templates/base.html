<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        {% block title %}{% endblock %}
    </title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

</head>
<body>

<header>

    <div class="logo">
        ShortLink
    </div>

    <nav>

       <button id="restoreBtn" class="nav-btn">
           Deleted links
       </button>

        <a href="{{ url_for('auth.logout') }}">
            Logout
        </a>

    </nav>

</header>

<main>

    {% block content %}
    {% endblock %}

</main>

<div id="restoreModal" class="modal-overlay">


    <div class="restore-modal">


        <div class="modal-header">

            <div>
                <h2>
                    Deleted Links
                </h2>
                <p class="modal-subtitle" id="deletedCount"></p>
            </div>


            <button id="closeModal" aria-label="Close">
                ✕
            </button>

        </div>



        <div id="deletedLinks">

            <table>

                <thead>
                    <tr>
                        <th>Short URL</th>
                        <th>Title</th>
                        <th>Clicks</th>
                        <th>Deleted</th>
                        <th>Action</th>
                    </tr>
                </thead>


                <tbody id="deletedLinksBody">

                </tbody>

            </table>

        </div>
    </div>
</div>

<script>

const modal = document.getElementById("restoreModal");

const restoreBtn = document.getElementById("restoreBtn");

const closeModal = document.getElementById("closeModal");

const deletedCountEl = document.getElementById("deletedCount");


restoreBtn.onclick = async ()=>{

    modal.style.display = "flex";

    loadDeletedLinks();

};



closeModal.onclick = ()=>{

    modal.style.display="none";

    window.location.reload();

};

modal.addEventListener("click", function(event){

    if (event.target === modal) {

        modal.style.display = "none";

        window.location.reload();

    }

});

document.addEventListener("keydown", function(event){

    if (event.key === "Escape" && modal.style.display === "flex") {

        modal.style.display = "none";

        window.location.reload();

    }

});


function formatDeletedAt(value){

    const date = new Date(value);

    if (isNaN(date.getTime())) return value;

    return date.toLocaleDateString(undefined, {

        month: "short",
        day: "numeric",
        year: "numeric"

    });

}


function escapeHtml(str){

    const div = document.createElement("div");

    div.innerText = str ?? "";

    return div.innerHTML;

}


async function loadDeletedLinks(){


    const tbody =
        document.getElementById("deletedLinksBody");

    tbody.innerHTML = `
        <tr>
            <td colspan="5" class="modal-loading">
                Loading deleted links...
            </td>
        </tr>
    `;

    deletedCountEl.innerText = "";


    let links;

    try {

        const response =
            await fetch("/deleted-links");

        if (!response.ok) {
            throw new Error("Request failed");
        }

        links = await response.json();

    } catch (err) {

        tbody.innerHTML = `
            <tr>
                <td colspan="5" class="modal-error-row">
                    Couldn't load deleted links. Try again.
                </td>
            </tr>
        `;

        return;

    }


    tbody.innerHTML="";


    if(links.length === 0){

        deletedCountEl.innerText = "Nothing here";

         tbody.innerHTML = `
            <tr>
                <td colspan="5" class="modal-empty-row">
                    <div class="modal-empty-icon">🗑️</div>
                    No deleted links
                </td>
            </tr>
        `;

        return;

    }

    deletedCountEl.innerText = `${links.length} link${links.length === 1 ? "" : "s"}`;


    links.forEach(link=>{

        const safeCode = escapeHtml(link.short_code);
        const safeTitle = escapeHtml(link.title ?? "Untitled Page");

        tbody.innerHTML += `

        <tr id="deleted-row-${safeCode}">


            <td class="deleted-short-code">
                ${safeCode}
            </td>


            <td class="title-cell" title="${safeTitle}">
                ${safeTitle}
            </td>


            <td>
                <span class="click-badge">${link.clicks}</span>
            </td>


            <td class="deleted-date">
                ${formatDeletedAt(link.deleted_at)}
            </td>


            <td class="deleted-actions">

                <button
                    class="restore-btn"
                    onclick="restoreLink('${safeCode}')"
                >
                    Restore
                </button>

                <button
                    class="clear-btn"
                    onclick="clearLink('${safeCode}')"
                    title="Delete permanently"
                >
                    Delete forever
                </button>

            </td>


        </tr>

        `;


    });


}



async function restoreLink(code){

    try {

        const response =
            await fetch(`/restore/${code}`, {

                method:"POST"

            });

        const result =
            await response.json();

        if(result.success){

            loadDeletedLinks();

        }

    } catch (err) {

        alert("Couldn't restore this link. Try again.");

    }

}


async function clearLink(code){

    if (!confirm("Permanently delete this link? This can't be undone.")) {

        return;

    }

    try {

        const response =
            await fetch(`/clear/${code}`, {

                method:"POST"

            });

        const result =
            await response.json();

        if(result.success){

            loadDeletedLinks();

        }

    } catch (err) {

        alert("Couldn't delete this link. Try again.");

    }

}


</script>

</body>
</html>
