{% extends "base_auth.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="auth-card">

    <h2>Welcome Back</h2>

    <p class="subtitle">
        Login to your account.
    </p>

    <form method="POST">

        <div class="input-group">
            <label>Email</label>
            <input
                type="email"
                name="email"
                placeholder="Enter email"
                required
            >
        </div>

        <div class="input-group">
            <label>Password</label>
            <input
                type="password"
                name="password"
                placeholder="Enter password"
                required
            >
        </div>

        <button type="submit" class="btn-primary">
            Login
        </button>

    </form>

    <div class="auth-footer">
        Don't have an account?
        <a href="{{ url_for('auth.register') }}">
            Register
        </a>
    </div>

</div>

{% endblock %}
