services:
  web:
    build: .

    container_name: url_shortener

    restart: always

    env_file:
      - .env

    ports:
      - 5001:5000

    networks:
      - shared_db

    develop:
      watch:
        - action: sync
          path: .
          target: /app

        - action: rebuild
          path: requirements.txt



networks:
   shared_db:
      external: true